{% extends "base.html" %}
{% block content %}
<h3>Replies</h3>
<button class="btn btn-outline-primary mb-3" id="check-now">Check for new replies now</button>
<span id="check-result"></span>

<table class="table table-striped bg-white">
  <thead><tr><th>From</th><th>Business</th><th>Subject</th><th>Snippet</th><th>Received</th><th></th></tr></thead>
  <tbody>
  {% for r in replies %}
    <tr>
      <td>{{ r.from_addr }}</td>
      <td>{{ r.business_name or r.lead_email }}</td>
      <td>{{ r.subject }}</td>
      <td>{{ r.snippet }}</td>
      <td>{{ r.created_at }}</td>
      <td><a href="/thread/{{ r.thread_id }}">Open thread</a></td>
    </tr>
  {% else %}
    <tr><td colspan="6">No replies yet.</td></tr>
  {% endfor %}
  </tbody>
</table>

<script>
document.getElementById('check-now').addEventListener('click', async () => {
  const btn = document.getElementById('check-now');
  btn.disabled = true;
  const res = await fetch('/api/replies/check-now', {method: 'POST'});
  const data = await res.json();
  if (data.already_running) {
    document.getElementById('check-result').textContent = 'Already checking — hang tight.';
  } else {
    document.getElementById('check-result').textContent = 'Checking inboxes in the background...';
  }
  const poll = setInterval(async () => {
    const s = await fetch('/api/replies/check-status');
    const sd = await s.json();
    if (!sd.running) {
      clearInterval(poll);
      const found = sd.last_result;
      document.getElementById('check-result').textContent =
        found === null ? 'Done.' : `Found ${found} new replies. Reloading...`;
      btn.disabled = false;
      setTimeout(() => location.reload(), 1200);
    }
  }, 2000);
});
</script>
{% endblock %}
